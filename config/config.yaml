# ---------------------------------------------------------------------------
# IFS (Intuitionistic Fuzzy Set) conversion
# ---------------------------------------------------------------------------
ifs:
  # Maximum observable score used for linear normalization to [0,1]
  score_max: 3.33
  # Hesitancy assignment method: "complement" => pi = 1 - mu - nu
  # with nu = 1 - mu - epsilon where epsilon is a small fixed hesitancy
  hesitancy_method: "fixed_pi"
  fixed_pi_value: 0.05          # constant hesitancy for all scores
  # mu = x / score_max * (1 - fixed_pi_value)
  # nu = 1 - mu - fixed_pi_value
  # Result: always mu + nu + pi = 1 with pi = fixed_pi_value


# ---------------------------------------------------------------------------
# MCDM — Weighting
# ---------------------------------------------------------------------------
mcdm:
  weighting:
    method: "two_level_if_critic"
    # Stage 1: CRITIC within each criterion group (sub-criteria weights)
    # Stage 2: CRITIC across criterion aggregates (criteria weights)
    correlation_method: "pearson"    # used on score-function S(x)=mu-nu values
    min_variance_threshold: 1.0e-9   # skip CRITIC if column variance < threshold
    weight_blend_method: "proportional_years"  # blend regime weights by year count

  ranking:
    methods:
      - "if_waspas"
      - "if_topsis"
      - "if_promethee2"

    if_waspas:
      lambda_param: 0.5              # 0=pure WPM, 1=pure WSM, 0.5=balanced

    if_topsis:
      distance_metric: "normalized_euclidean"

    if_promethee2:
      preference_function: "gaussian"
      p_parameter: 0.1              # Gaussian preference function spread


# ---------------------------------------------------------------------------
# MCDM Analysis
# ---------------------------------------------------------------------------
analysis:
  weighting:
    temporal_stability:
      window_size: 5
      n_windows: 10                  # windows 1-10 covering years 2011-2020 start
      metrics: ["rmsd", "cv"]

    sensitivity:
      n_simulations: 10000
      perturbation_distribution: "dirichlet"
      dirichlet_concentration_scale: 10.0  # alpha = base_weight * scale
      correlation_metric: "kendall_tau_b_weighted"
      random_state: 42

  ranking:
    inter_method_correlation: "spearman"
    discriminatory_power_metric: "iqr"
    temporal_persistence_metric: "spearman_yoy"


# ---------------------------------------------------------------------------
# Machine Learning
# ---------------------------------------------------------------------------
ml:
  imputation:
    method: "mice"                   # sklearn IterativeImputer
    max_iter: 10
    n_nearest_features: null         # null = use all features
    initial_strategy: "mean"         # initial fill strategy
    random_state: 42
    # Panel is reshaped to (882, 29) before fitting — no leakage
    # Imputed values clipped to [0.0, 3.33] post-imputation

  forecasting:
    target_year: 2025
    prediction_length: 1
    presets: "medium_quality"       # Use medium_quality for better balance
    refit_full: true
    known_covariates_names: null     # no future-known covariates
    eval_metric: "MASE"
    freq: "Y"                        # annual frequency
    random_state: 42
    model_save_dir: "output/ml/ag_models"  # AutoGluon models saved here

  shap:
    explainer_type: "auto"           # auto-selects TreeExplainer or KernelExplainer
    n_background_samples: 100        # KernelExplainer background sample size
    random_state: 42


# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  mcdm_dir: "output/mcdm"
  ml_dir: "output/ml"
  figures_dir: "output/figures"
  reports_dir: "output/reports"
  tabular_format: "csv"              # "csv" or "parquet"
  figure_dpi: 300
  figure_format: "png"
